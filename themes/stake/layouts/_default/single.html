{{ define "main" }}
<article>
  <header>
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
        {{ .Date.Format "2006 年 1 月 2 日" }}
      </time>
      | 阅读时间: {{ .ReadingTime }} 分钟
    </div>
  </header>
  
  <div class="content">
    {{ .Content }}
  </div>

  {{ if .Params.tags }}
  <footer>
    <div class="tags">
      <strong>标签:</strong>
      {{ range .Params.tags }}
        <a href="{{ "/tags/" | relURL }}{{ . | urlize }}">#{{ . }}</a>
      {{ end }}
    </div>
  </footer>
  {{ end }}
</article>
{{ end }}
